<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Task Dashboard - GitHub Live</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.1.12/umd/Recharts.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const Recharts = window.Recharts || {};
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        // --- ตั้งค่า GITHUB URL ตรงนี้ ---
        // เปลี่ยน URL นี้เป็น Raw URL จาก GitHub ของคุณ
        const GITHUB_CSV_URL = "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/2025%2010%2020%20KPI%202568_%E0%B8%AA%E0%B8%A8%E0%B8%B2%E0%B8%9B%E0%B8%B1%E0%B8%95%E0%B8%A2%E0%B9%8C.csv";

        const CSV_HEADERS = [
            'Status', 'Type', 'KPI Task', 'Name Project', 
            'Detail / Note', 'Assignee', 'Deadline', 'Priority', 'Budget'
        ];

        const FILTER_LABELS = {
            'Status': 'สถานะงาน',
            'Type': 'ประเภท KPI',
            'KPI Task': 'ชื่องาน',
            'Name Project': 'โปรเจค',
            'Assignee': 'ผู้รับผิดชอบ',
            'Priority': 'ความสำคัญ'
        };

        const parseCSVFull = (text) => {
            let ret = [], row = [], token = '', inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                let nextC = text[i+1];
                if (c === '"') {
                    if (inQuotes && nextC === '"') { token += '"'; i++; } else { inQuotes = !inQuotes; }
                } else if (c === ',' && !inQuotes) {
                    row.push(token); token = '';
                } else if ((c === '\n' || c === '\r') && !inQuotes) {
                    if (c === '\r' && nextC === '\n') i++;
                    row.push(token);
                    if (row.some(val => val.trim() !== '')) ret.push(row);
                    row = []; token = '';
                } else { token += c; }
            }
            if (token || row.length > 0) {
                row.push(token);
                if (row.some(val => val.trim() !== '')) ret.push(row);
            }
            return ret;
        };

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [filters, setFilters] = useState({});

            const fetchDataFromGithub = async () => {
                setLoading(true);
                setError(null);
                try {
                    // ป้องกันการ Cache โดยการเติม Timestamp ต่อท้าย URL
                    const response = await fetch(`${GITHUB_CSV_URL}?t=${new Date().getTime()}`);
                    if (!response.ok) throw new Error("ไม่สามารถดึงข้อมูลจาก GitHub ได้");
                    const csvText = await response.text();
                    
                    const parsedRows = parseCSVFull(csvText);
                    if (parsedRows.length === 0) return;
                    
                    const headersFromCsv = parsedRows[0].map(h => h.trim());
                    const parsedData = parsedRows.slice(1).map(row => {
                        const obj = {};
                        headersFromCsv.forEach((h, i) => { if(h) obj[h] = row[i] ? row[i].trim() : ''; });
                        return obj;
                    }).filter(row => row['Status'] || row['KPI Task']);

                    setData(parsedData);
                    setLoading(false);
                } catch (err) {
                    setError(err.message);
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchDataFromGithub();
            }, []);

            const filterOptions = useMemo(() => {
                const options = {};
                CSV_HEADERS.forEach(header => {
                    let validValues = data.map(d => d[header]).filter(v => v !== undefined && v !== '');
                    if (header === 'Status') validValues = validValues.filter(v => v.length <= 30 && !v.includes('\n'));
                    if (header === 'Type') validValues = validValues.filter(v => v.length <= 50 && !v.toLowerCase().includes('vietnam'));
                    options[header] = ['All', ...new Set(validValues)].sort();
                });
                return options;
            }, [data]);

            const filteredData = useMemo(() => {
                return data.filter(row => {
                    return CSV_HEADERS.every(header => {
                        return !filters[header] || filters[header] === 'All' || row[header] === filters[header];
                    });
                });
            }, [data, filters]);

            const stats = useMemo(() => {
                const total = filteredData.length;
                const completed = filteredData.filter(d => d['Status'] && d['Status'].includes('เสร็จ')).length;
                const inProgress = filteredData.filter(d => d['Status'] && d['Status'].includes('กำลังดำเนินการ')).length;
                return { total, completed, inProgress, completionRate: total > 0 ? Math.round((completed / total) * 100) : 0 };
            }, [filteredData]);

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-slate-50">
                    <div className="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
                    <p className="mt-4 text-slate-600 font-medium">กำลังดึงข้อมูลล่าสุดจาก GitHub...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8">
                    <div className="max-w-[1400px] mx-auto space-y-6">
                        
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-900">KPI Live Dashboard</h1>
                                <p className="text-sm text-slate-500">ข้อมูลเชื่อมต่อโดยตรงกับไฟล์บน GitHub</p>
                            </div>
                            <button 
                                onClick={fetchDataFromGithub}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all shadow-sm flex items-center gap-2"
                            >
                                🔄 อัปเดตข้อมูลตอนนี้
                            </button>
                        </div>

                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl text-sm flex items-center gap-2">
                                ⚠️ {error} (โปรดตรวจสอบ URL ในโค้ด)
                            </div>
                        )}

                        {/* Stats Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                <p className="text-xs font-bold text-slate-400 uppercase">งานทั้งหมด</p>
                                <h3 className="text-2xl font-bold text-slate-900">{stats.total}</h3>
                            </div>
                            <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                <p className="text-xs font-bold text-emerald-500 uppercase">เสร็จแล้ว</p>
                                <h3 className="text-2xl font-bold text-slate-900">{stats.completed}</h3>
                            </div>
                            <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                <p className="text-xs font-bold text-amber-500 uppercase">กำลังทำ</p>
                                <h3 className="text-2xl font-bold text-slate-900">{stats.inProgress}</h3>
                            </div>
                            <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                <p className="text-xs font-bold text-indigo-500 uppercase">ความสำเร็จ</p>
                                <h3 className="text-2xl font-bold text-slate-900">{stats.completionRate}%</h3>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            {/* Filter Side */}
                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 overflow-y-auto max-h-[80vh] custom-scrollbar">
                                    <h3 className="font-bold mb-4 text-slate-800">ตัวกรองข้อมูล</h3>
                                    {Object.keys(FILTER_LABELS).map(header => (
                                        <div key={header} className="mb-4">
                                            <label className="text-xs font-bold text-slate-500 mb-1 block">{FILTER_LABELS[header]}</label>
                                            <select 
                                                className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none"
                                                value={filters[header] || 'All'}
                                                onChange={(e) => setFilters({...filters, [header]: e.target.value})}
                                            >
                                                {filterOptions[header] && filterOptions[header].map(opt => (
                                                    <option key={opt} value={opt}>{opt === 'All' ? '-- ทั้งหมด --' : opt}</option>
                                                ))}
                                            </select>
                                        </div>
                                    ))}
                                    <button 
                                        onClick={() => setFilters({})}
                                        className="w-full py-2 text-sm text-indigo-600 font-bold bg-indigo-50 rounded-lg hover:bg-indigo-100"
                                    >
                                        ล้างตัวกรอง
                                    </button>
                                </div>
                            </div>

                            {/* Data Table Side */}
                            <div className="lg:col-span-3">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="overflow-x-auto custom-scrollbar">
                                        <table className="w-full text-left border-collapse min-w-[800px]">
                                            <thead>
                                                <tr className="bg-slate-50 text-slate-500 text-[10px] uppercase font-bold tracking-widest border-b border-slate-100">
                                                    <th className="p-4">Status</th>
                                                    <th className="p-4">ชื่องาน / โปรเจค</th>
                                                    <th className="p-4">ผู้รับผิดชอบ</th>
                                                    <th className="p-4">ความสำคัญ</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredData.map((row, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-4">
                                                            <span className={`px-2 py-1 rounded-md text-[10px] font-bold border ${
                                                                row.Status.includes('เสร็จ') ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-amber-50 text-amber-600 border-amber-100'
                                                            }`}>
                                                                {row.Status}
                                                            </span>
                                                        </td>
                                                        <td className="p-4">
                                                            <div className="text-sm font-bold text-slate-800">{row['KPI Task']}</div>
                                                            <div className="text-[10px] text-slate-400 font-medium">{row['Name Project']}</div>
                                                        </td>
                                                        <td className="p-4 text-sm text-slate-600 font-medium">{row.Assignee}</td>
                                                        <td className="p-4">
                                                            <span className="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded">
                                                                {row.Priority}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
